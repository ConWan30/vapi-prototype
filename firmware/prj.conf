# SPDX-License-Identifier: Apache-2.0
#
# VAPI Agent — Zephyr Project Configuration
# Target: IoTeX Pebble Tracker (nRF9160)
#
# This configures all kernel, driver, crypto, networking, and logging
# subsystems required for the VAPI autonomous agent.

# --------------------------------------------------------------------------
# General
# --------------------------------------------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_REBOOT=y
CONFIG_HWINFO=y

# --------------------------------------------------------------------------
# Logging
# --------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BUFFER_SIZE=2048
# Custom log levels for VAPI modules
CONFIG_VAPI_LOG_LEVEL=4
CONFIG_VAPI_AGENT_LOG_LEVEL=3
CONFIG_POAC_LOG_LEVEL=3

# --------------------------------------------------------------------------
# Zephyr Kernel
# --------------------------------------------------------------------------
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_TIMESLICING=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# --------------------------------------------------------------------------
# Non-Volatile Storage (for PoAC counter + chain state persistence)
# --------------------------------------------------------------------------
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# --------------------------------------------------------------------------
# Cryptography — PSA Crypto API backed by CryptoCell-310
# --------------------------------------------------------------------------
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192
CONFIG_PSA_CRYPTO_DRIVER_CC3XX=y

# ECDSA P-256 (for PoAC signing)
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y

# Persistent key storage
CONFIG_PSA_ITS_ENCRYPTED=y

# --------------------------------------------------------------------------
# Sensors (I2C + SPI)
# --------------------------------------------------------------------------
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_SPI=y

# BME680 — Environmental (temp, humidity, pressure, VOC)
CONFIG_BME680=y

# ICM-42605 — 6-axis IMU (accel + gyro)
CONFIG_ICM42605=y
CONFIG_ICM42605_TRIGGER_NONE=y

# TSL2572 — Ambient light
# Note: Zephyr may require a custom driver or the tsl2561 compatible
CONFIG_TSL2561=y

# --------------------------------------------------------------------------
# GPS — nRF9160 GNSS interface
# --------------------------------------------------------------------------
CONFIG_NRF_MODEM_LIB=y
CONFIG_NRF_MODEM_LIB_ON_FAULT_APPLICATION_SPECIFIC=y
CONFIG_MODEM_INFO=y

# GNSS
CONFIG_NRF_CLOUD_AGNSS=y
CONFIG_NRF_CLOUD_PGPS=y

# --------------------------------------------------------------------------
# Cellular — LTE-M / NB-IoT
# --------------------------------------------------------------------------
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y
CONFIG_LTE_AUTO_INIT_AND_CONNECT=n

# Power Saving Mode (PSM) — essential for battery life
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00101000"
CONFIG_LTE_PSM_REQ_RAT="00000100"

# eDRX
CONFIG_LTE_EDRX_REQ=y

# --------------------------------------------------------------------------
# Networking (for MQTT/CoAP uplink)
# --------------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_NET_NATIVE=n

CONFIG_MQTT_LIB=y
CONFIG_MQTT_KEEPALIVE=300

# CoAP (for bounty feed)
CONFIG_COAP=y

# --------------------------------------------------------------------------
# GPIO (LED, Buzzer)
# --------------------------------------------------------------------------
CONFIG_GPIO=y

# --------------------------------------------------------------------------
# ADC (Battery voltage measurement)
# --------------------------------------------------------------------------
CONFIG_ADC=y

# --------------------------------------------------------------------------
# Floating point (for sensor math and economic calculations)
# --------------------------------------------------------------------------
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# --------------------------------------------------------------------------
# TinyML / Edge Impulse (optional — set to y when a trained model is ready)
# --------------------------------------------------------------------------
# When n (default): heuristic fallback classifier runs from tinyml.c
# When y: Edge Impulse C++ library is compiled from models/edge_impulse/
CONFIG_VAPI_EDGE_IMPULSE=n

# C++ support required by Edge Impulse SDK (auto-enabled when EI is on)
CONFIG_CPLUSPLUS=n
CONFIG_LIB_CPLUSPLUS=n
CONFIG_NEWLIB_LIBC=n

# --------------------------------------------------------------------------
# Watchdog (safety net for autonomous operation)
# --------------------------------------------------------------------------
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n
