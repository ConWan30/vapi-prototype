version: "3.8"

services:
  bridge:
    build: .
    container_name: vapi-bridge
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${COAP_PORT:-5683}:5683/udp"
    volumes:
      - bridge-data:/data
    env_file:
      - .env
    depends_on:
      - mqtt

  mqtt:
    image: eclipse-mosquitto:2
    container_name: vapi-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
    command: mosquitto -c /mosquitto/config/mosquitto.conf

volumes:
  bridge-data:
  mqtt-data:
