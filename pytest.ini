[pytest]
# importlib mode prevents bridge/tests and sdk/tests from colliding as the
# same "tests" package when pytest collects both suites from the project root.
addopts = --import-mode=importlib -m "not hardware"
asyncio_mode = strict

[pytest:markers]
hardware: requires physical DualShock Edge (Sony CFI-ZCP1) connected via USB.
          Skip in CI; run with: pytest tests/hardware/ -v -m hardware
